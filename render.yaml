services:
  - type: web
    name: crud-app
    runtime: docker
    plan: free
    healthCheckPath: /

    envVars:
      - key: APP_NAME
        value: "Blog Post App"
      - key: APP_DEBUG
        value: "false"
      - key: APP_ENV
        value: production
      - key: LOG_CHANNEL
        value: stdout
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /app/database/database.sqlite
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_LIFETIME
        value: "120"
      - key: CACHE_STORE
        value: file

    dockerfilePath: ./Dockerfile

    # Auto-deploy on push to main
    autoDeploy: true
